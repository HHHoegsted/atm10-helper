services:
  atm10-helper-db:
    image: postgres:16-alpine
    container_name: atm10-helper-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - atm10_helper_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  atm10-helper-api:
    build:
      context: .
    container_name: atm10-helper-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: atm10-helper-db
      POSTGRES_PORT: "5432"
    ports:
      - "8020:8000"
    depends_on:
      atm10-helper-db:
        condition: service_healthy
    command:
      - uv
      - run
      - uvicorn
      - atm10_helper.api:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

volumes:
  atm10_helper_pgdata: